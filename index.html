<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erhan Erciyes</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-frame">
        <header class="top-header">
            <h1 class="dashboard-title">
                <i class="fas fa-network-wired"></i> Portfolio Dashboard
            </h1>
            
            <nav class="nav-menu">
                <button class="nav-btn active" onclick="loadPage('profile', this)">Profile</button>
                <button class="nav-btn" onclick="loadPage('monitor', this)">ER Monitor</button>
            </nav>

            <div class="theme-switcher">
                <button class="theme-btn active" onclick="setTheme('light')" id="btn-light">
                    <i class="fas fa-sun"></i> Light
                </button>
                <button class="theme-btn" onclick="setTheme('dark')" id="btn-dark">
                    <i class="fas fa-moon"></i> Dark
                </button>
                <button class="theme-btn" onclick="setTheme('vice-city')" id="btn-vice-city">
                    🌴 Vice City
                </button>
            </div>
        </header>

        <div id="page-content">
            </div>

        <footer>
            <small>Portfolio Erhan Erciyes | ER Monitor | © 2026</small>
        </footer>
    </div>

    <div id="shock-flash"></div>

    <script src="script.js"></script>
</body>
</html>
